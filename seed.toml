# idm 默认**账号**(实例数据 + 密码)。`just seed` / 进程内 seed 读它幂等写进 idm。
# `SEED_FILE` 可指外部文件覆盖(prod 换真账号/密码)。
#
# 角色集 / 权限集 / role→权限默认 **不在这里** —— 它们是代码闭集(src/infra/authz.rs 的
# `RoleName` / `Perm`,不做动态 CRUD)。role→权限的运行期改动落 app schema 的 `role_permissions` 表。
# 账号引用的 role 必须是 `RoleName` 的已知变体(superadmin/admin/user),拼错启动/测试即挂。
#
# `display_name` 可选:建号时连带建初始 profile(app schema)。只在 app/idm 同进程时写;
# 且**只在首建时写** —— 用户之后自己改的资料/头像,重跑 seed 不会按回去。

[[accounts]]
username = "superadmin"
email = "superadmin@local" # 可选;登录用 username 或 email 都行
password = "pwd"
roles = ["superadmin"]
display_name = "Super Admin"

[[accounts]]
username = "admin"
password = "pwd"
roles = ["admin"]
display_name = "Admin"

[[accounts]]
username = "user"
password = "pwd"
roles = ["user"]

# ── 租户(**dev 样例数据**)。prod 用 SEED_FILE 覆盖成不含本节的文件 ──
#
# 真实租户由平台后台开通(spec §1:平台开通 + 租户内部邀请),不走 seed。这里的两家公司是
# 给开发/冒烟用的:`user` 同时是 Acme 的 admin 和 Globex 的 member —— 正是 1:N 跨公司切换
# 那个场景(顾问/代理商同时服务多家客户),起服务即可 `GET /auth/tenants` 看到两条。
#
# `name` 是机器码 slug,**租户 id 由它确定性派生**(uuid v5)—— 每次重启、每台机器都一样。
# `members[].username` 引用上面 [[accounts]] 里的账号(标识引用,非 FK)。

[[tenants]]
name = "acme"
display_name = "Acme 公司"
members = [{ username = "user", role = "admin" }]

[[tenants]]
name = "globex"
display_name = "Globex 公司"
members = [{ username = "user", role = "member" }]
