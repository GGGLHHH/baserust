# nginx 反向代理:
#   /api/*  → app(业务 API,app 内部全局前缀 /api/v1)
#   /       → 预留给将来的前端 SPA
# dbhub 的 MCP 是开发期工具,直连它的端口即可,不经 nginx。
events {}

http {
    # Docker 内置 DNS。配合下面 set + 变量的 proxy_pass,让 nginx「每次请求」重新解析
    # app 的容器 IP —— 否则只在启动时解析一次并缓存,app 容器重启换 IP 后反代就一直 502。
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # idm(认证/账户)→ idm 容器。auth 端点分散在三组前缀下(public:登录注册 /
        # frontend:me 系 / admin:后台登录),均比 /api/ 更具体,nginx 取最长前缀匹配
        # 落到 idm 进程,其余业务落 app 进程。变量 + resolver 动态解析同理防 502。
        location /api/v1/public/auth/ {
            set $idm idm;
            proxy_pass http://$idm:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/frontend/auth/ {
            set $idm idm;
            proxy_pass http://$idm:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/admin/auth/ {
            set $idm idm;
            proxy_pass http://$idm:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 其余业务 API → app。变量承载后端主机,强制走上面的 resolver 动态解析,
        # 这样 app 容器随便重启换 IP,反代都自动跟上,不再 502。
        location /api/ {
            set $backend app;
            proxy_pass http://$backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE(/api/v1/frontend/widgets/events):关缓冲事件才实时透传;长连接读超时拉长。
            # 对普通 JSON 响应无感(响应小,缓冲本就一次刷完)。
            proxy_buffering off;
            proxy_http_version 1.1;   # SSE 长连接标准搭配(默认 1.0 靠 close 分帧,能用但非惯例)
            proxy_read_timeout 1h;
        }

        # / 预留给前端 SPA:将来把构建产物挂进来(root + try_files $uri /index.html),
        # 或反代到独立前端容器。现在先占位。
        location / {
            return 404;
        }
    }
}
