# nginx 反向代理:
#   /api/*  → app(业务 API,app 内部全局前缀 /api/v1)
#   /       → 预留给将来的前端 SPA
# dbhub 的 MCP 是开发期工具,直连它的端口即可,不经 nginx。
events {}

http {
    # Docker 内置 DNS。配合下面 set + 变量的 proxy_pass,让 nginx「每次请求」重新解析
    # app 的容器 IP —— 否则只在启动时解析一次并缓存,app 容器重启换 IP 后反代就一直 502。
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # 业务 API → app。变量承载后端主机,强制走上面的 resolver 动态解析,
        # 这样 app 容器随便重启换 IP,反代都自动跟上,不再 502。
        location /api/ {
            set $backend app;
            proxy_pass http://$backend:8080;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # / 预留给前端 SPA:将来把构建产物挂进来(root + try_files $uri /index.html),
        # 或反代到独立前端容器。现在先占位。
        location / {
            return 404;
        }
    }
}
