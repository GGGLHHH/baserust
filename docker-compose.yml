# baserust 本地容器栈:nginx(反代) → app(Rust 服务) + pg(Postgres) + dbhub(数据库 MCP)。
#
# 环境变量(都有默认值、可在同目录 .env 覆盖):
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB   pg 凭据与库名(默认 baserust)
#   APP_DB_USER/PASSWORD · IDM_DB_USER/PASSWORD · CONTENT_DB_USER/PASSWORD   各 schema role 凭据(默认 <role>/pwd)
#   MINIO_USER / MINIO_PASSWORD · S3_BUCKET           minio 凭据(默认 minio/minio12345)与桶名(默认 content)
#   NGINX_PORT(80) · APP_PORT(6453) · IDM_PORT(6454) · DBHUB_PORT(3777) · PG_PORT(5821)   主机端口
#   MINIO_PORT(9862, S3 API) · MINIO_CONSOLE_PORT(9863, 控制台)         minio 主机端口
#   NATS_PORT(2224)                                   nats 主机端口(widget 事件总线;容器内仍 4222)
#   RUST_LOG                                          app 日志级别
#
# 用法:
#   docker compose up -d --build
#   curl localhost/health        # 经 nginx 反代
#   curl localhost:6453/health   # 直连 app
#   # dbhub MCP(HTTP/SSE):http://localhost:3777

services:
  nginx:
    image: nginx:alpine
    depends_on:
      app:
        condition: service_healthy
      idm:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"

  app:
    # app 与 idm 共用同一镜像(runtime 阶段含 baserust + idm 两个二进制);只 entrypoint 不同。
    # 同名 image + 同 build → compose 只构建一次,idm 服务直接复用,不重复 build。
    image: baserust-runtime:latest
    build:
      context: .
      target: runtime
    depends_on:
      pg:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      # content 字节落 minio:等建桶的一次性任务跑完(桶一定先于 app 就绪)。
      minio-init:
        condition: service_completed_successfully
      # widget 事件总线走 NATS(app 启动 fail-fast 连接,必须先 healthy)。
      nats:
        condition: service_healthy
    environment:
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-info,baserust=info}
      # 运行环境:dev(默认)→彩色日志+挂/docs+CORS宽松;prod→JSON日志+不挂/docs+CORS白名单
      APP_ENV: ${APP_ENV:-dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # 连 app schema(role=app);表由下面 migrate 服务先建好。去掉这些 APP_DB_* 则 app 走内存。
      APP_DB_HOST: pg
      APP_DB_PORT: "5432"
      APP_DB_DATABASE: ${POSTGRES_DB:-baserust}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-pwd}
      # 连 content schema(role=content):content/object 元数据进 PG(字节进下面的 minio)。
      CONTENT_DB_HOST: pg
      CONTENT_DB_PORT: "5432"
      CONTENT_DB_DATABASE: ${POSTGRES_DB:-baserust}
      CONTENT_DB_USER: ${CONTENT_DB_USER:-content}
      CONTENT_DB_PASSWORD: ${CONTENT_DB_PASSWORD:-pwd}
      # 事件总线选择链最高优先:设了 NATS_URL → widget 事件走 NATS(去掉则回退 PG LISTEN/NOTIFY → 内存)。
      NATS_URL: nats://nats:4222
      # 对象存储:设了 S3_ENDPOINT → content 字节走 minio/S3(去掉则走内存 backend)。
      # **单域名方案**(presign 签名含 Host,签出的 URL 浏览器要能打):app 与浏览器用同一个
      # `minio.localhost:主机端口` —— 浏览器按 RFC 6761 把 *.localhost 解析到 127.0.0.1;
      # 容器靠下面 extra_hosts 的 host-gateway 解析回宿主机,再经主机端口映射进 minio。
      # 代价(接受):容器内 app 的字节路径绕 host 网关一圈(dev 无所谓;prod 用真对象存储公网域名,读写同端点)。
      # 主机上 curl 测它需 --resolve 或 /etc/hosts(浏览器免);host 跑 dev(just dev)直接用 localhost:9862。
      S3_ENDPOINT: http://minio.localhost:${MINIO_PORT:-9862}
      S3_BUCKET: ${S3_BUCKET:-content}
      S3_ACCESS_KEY: ${MINIO_USER:-minio}
      S3_SECRET_KEY: ${MINIO_PASSWORD:-minio12345}
      S3_REGION: ${S3_REGION:-us-east-1}
      # 生产分进程:app 只挂 app(widget + content),idm 由独立 idm 容器承载,
      # nginx 按 /api/v1/{public,frontend,admin}/auth 分流。
      # 经 Config 解析,只认小写 true/false。
      IDM_EMBEDDED: "false"
      # app 的鉴权中间件只 decode JWT:非对称 Ed25519,只需公钥。默认用内嵌 dev 公钥;
      # 生产挂 JWT_PUBLIC_KEY_FILE 指向卷内公钥(app 进程不持私钥,被攻破也铸不出 token)。
      # JWT_PUBLIC_KEY_FILE: /keys/prod-ed25519.pub.pem
      # 跨模块读 idm 的预留凭据(依赖方向 app 业务→idm 认证):富化接口时 connect_for_schema(Idm) 用,
      # 拿到连接后走 idm 模块的 repo 读、绝不跨 schema join。当前主连接按 mount(needs_idm=false)不连,纯预留。
      IDM_DB_HOST: pg
      IDM_DB_PORT: "5432"
      IDM_DB_DATABASE: ${POSTGRES_DB:-baserust}
      IDM_DB_USER: ${IDM_DB_USER:-idm}
      IDM_DB_PASSWORD: ${IDM_DB_PASSWORD:-pwd}
    # 单域名 presign 的另一半:容器内把 minio.localhost 指回宿主机网关(配合上面 S3_ENDPOINT 注释)。
    extra_hosts:
      - "minio.localhost:host-gateway"
    # readiness:/readyz ping DB 通才算就绪 → nginx 等它 healthy 才放流量(curl 由 runtime 镜像装)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "${APP_PORT:-6453}:8080"

  # idm 进程:同一镜像,override entrypoint 跑 idm bin,只挂 auth(分 public/frontend/admin 三组前缀)。连 idm schema。
  # idm 进程:**同一镜像**(同 image+build → 复用 app 已构建的那份),只 override entrypoint 跑 idm bin。
  idm:
    image: baserust-runtime:latest
    build:
      context: .
      target: runtime
    entrypoint: ["idm"]
    depends_on:
      pg:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-info,baserust=info}
      APP_ENV: ${APP_ENV:-dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # 连 idm schema(role=idm):me 查 user / roles、会话 revoke 等。
      IDM_DB_HOST: pg
      IDM_DB_PORT: "5432"
      IDM_DB_DATABASE: ${POSTGRES_DB:-baserust}
      IDM_DB_USER: ${IDM_DB_USER:-idm}
      IDM_DB_PASSWORD: ${IDM_DB_PASSWORD:-pwd}
      # idm 签发 JWT:非对称 Ed25519,持私钥签发 + 公钥(与 app 同一把)。默认内嵌 dev 对;
      # 生产挂 JWT_PRIVATE_KEY_FILE(签发)+ JWT_PUBLIC_KEY_FILE(自验),app 只挂公钥。
      # JWT_PRIVATE_KEY_FILE: /keys/prod-ed25519.pem
      # JWT_PUBLIC_KEY_FILE: /keys/prod-ed25519.pub.pem
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "${IDM_PORT:-6454}:8080"

  # 一次性迁移容器:pg healthy 后跑 `sqlx migrate run`,完成即退出(restart: no)。
  # app 用 depends_on service_completed_successfully 等它跑完才起 → 表一定先于 app 就绪。
  # 回滚/查看:`docker compose run --rm migrate revert` / `... info`(覆盖默认的 run)。
  migrate:
    build:
      context: .
      target: migrate
    depends_on:
      pg:
        condition: service_healthy
    environment:
      PG_HOST: pg
      POSTGRES_DB: ${POSTGRES_DB:-baserust}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-pwd}
      IDM_DB_USER: ${IDM_DB_USER:-idm}
      IDM_DB_PASSWORD: ${IDM_DB_PASSWORD:-pwd}
      # content schema 也由本容器迁移(migrate-all.sh 按 app/idm/content 三 schema 各用同名 role 跑)。
      CONTENT_DB_USER: ${CONTENT_DB_USER:-content}
      CONTENT_DB_PASSWORD: ${CONTENT_DB_PASSWORD:-pwd}
    restart: "no"

  pg:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baserust}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baserust}
      POSTGRES_DB: ${POSTGRES_DB:-baserust}
      # initdb 脚本用:各 schema 的 role 名(=schema 名)与密码,各走独立变量
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-pwd}
      IDM_DB_USER: ${IDM_DB_USER:-idm}
      IDM_DB_PASSWORD: ${IDM_DB_PASSWORD:-pwd}
      CONTENT_DB_USER: ${CONTENT_DB_USER:-content}
      CONTENT_DB_PASSWORD: ${CONTENT_DB_PASSWORD:-pwd}
    ports:
      - "${PG_PORT:-5821}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 首次初始化时建 app/idm/content 的 role + schema(role 的 search_path 指向自己 schema)。
      # 注意只在**空 volume** 首次启动时跑:加了新 schema 后老 volume 需 down -v 重建(或手建 role)。
      - ./scripts/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baserust} -d ${POSTGRES_DB:-baserust}"]
      interval: 5s
      timeout: 3s
      retries: 10

  dbhub:
    image: bytebase/dbhub
    depends_on:
      pg:
        condition: service_healthy
    # 连本栈的 pg,以 HTTP 暴露 MCP(给 AI 工具查询/管理这个项目的数据库)。
    command:
      - --transport
      - http
      - --port
      - "8080"
      - --dsn
      - postgres://${POSTGRES_USER:-baserust}:${POSTGRES_PASSWORD:-baserust}@pg:5432/${POSTGRES_DB:-baserust}?sslmode=disable
    # 安全建议:dbhub 支持只读模式,确认 flag 后在上面 command 加一行(如 `--readonly`)防 MCP 误写。
    ports:
      - "${DBHUB_PORT:-3777}:8080"

  # NATS:widget 事件总线的多实例扇出后端(EventBus 选择链最高优先,app 设 NATS_URL 即用)。
  # core NATS 纯内存转发、无持久化(契约就是 best-effort);脚手架无鉴权裸跑,跨信任域配 token/TLS。
  # -m 8222 开监控端口,healthz 供 healthcheck(app fail-fast 连接,依赖它先 healthy)。
  nats:
    image: nats:alpine
    command: ["-m", "8222"]
    ports:
      - "${NATS_PORT:-2224}:4222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3 兼容对象存储:content 模块的字节落这(元数据进 PG,字节进 minio)。
  # 不设 app 的 S3_ENDPOINT 则 content 走内存 backend、本服务可不起(对齐"零外部依赖也能跑")。
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio12345}
      # 浏览器两步上传要跨域 PUT 到 minio(页面在 app 域、凭证在 minio 域)。minio **默认全开** CORS,
      # 这里显式化:prod 把 MINIO_CORS_ORIGIN 收紧到前端域。**curl 测不出 CORS**(不做预检),浏览器才炸。
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGIN:-*}
    # 主机发布端口走环境变量(同其他服务);默认 9862(S3 API)/ 9863(控制台)。
    # 容器内仍是 minio 默认 9000/9001;minio-init 走内网 http://minio:9000;
    # app 走单域名 minio.localhost:主机端口(见 app.environment 的 S3_ENDPOINT 注释)——主机端口改了要联动。
    ports:
      - "${MINIO_PORT:-9862}:9000"            # S3 API
      - "${MINIO_CONSOLE_PORT:-9863}:9001"    # web 控制台
    volumes:
      - miniodata:/data

  # 一次性:等 minio 起来 + 幂等建桶(minio/minio 镜像无 curl,健康检查交给这个 mc one-shot)。
  # app 用 depends_on service_completed_successfully 等它跑完 → 桶一定先于 app 就绪。
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_USER:-minio} $${MINIO_PASSWORD:-minio12345}; do echo 'waiting for minio'; sleep 1; done;
      mc mb --ignore-existing local/$${S3_BUCKET:-content};
      "
    restart: "no"

volumes:
  pgdata:
  miniodata:
