# baserust 本地容器栈:nginx(反代) → app(Rust 服务) + pg(Postgres) + dbhub(数据库 MCP)。
#
# 环境变量(都有默认值、可在同目录 .env 覆盖):
#   POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB   pg 凭据与库名(默认 xchangeai)
#   NGINX_PORT(80) · APP_PORT(6453) · DBHUB_PORT(3777) · PG_PORT(5821)   主机端口
#   RUST_LOG                                          app 日志级别
#
# 用法:
#   docker compose up -d --build
#   curl localhost/health        # 经 nginx 反代
#   curl localhost:6453/health   # 直连 app
#   # dbhub MCP(HTTP/SSE):http://localhost:3777

services:
  nginx:
    image: nginx:alpine
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"

  app:
    build:
      context: .
      target: runtime
    depends_on:
      pg:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: ${RUST_LOG:-info,xchangeai=info}
      # 运行环境:dev(默认)→彩色日志+挂/docs+CORS宽松;prod→JSON日志+不挂/docs+CORS白名单
      APP_ENV: ${APP_ENV:-dev}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      # 连 app schema(role=app);表由下面 migrate 服务先建好。去掉这些 APP_DB_* 则 app 走内存。
      APP_DB_HOST: pg
      APP_DB_PORT: "5432"
      APP_DB_DATABASE: ${POSTGRES_DB:-xchangeai}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-pwd}
    # readiness:/readyz ping DB 通才算就绪 → nginx 等它 healthy 才放流量(curl 由 runtime 镜像装)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "${APP_PORT:-6453}:8080"

  # 一次性迁移容器:pg healthy 后跑 `sqlx migrate run`,完成即退出(restart: no)。
  # app 用 depends_on service_completed_successfully 等它跑完才起 → 表一定先于 app 就绪。
  # 回滚/查看:`docker compose run --rm migrate revert` / `... info`(覆盖默认的 run)。
  migrate:
    build:
      context: .
      target: migrate
    depends_on:
      pg:
        condition: service_healthy
    environment:
      PG_HOST: pg
      POSTGRES_DB: ${POSTGRES_DB:-xchangeai}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-pwd}
      IDM_DB_USER: ${IDM_DB_USER:-idm}
      IDM_DB_PASSWORD: ${IDM_DB_PASSWORD:-pwd}
    restart: "no"

  pg:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xchangeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xchangeai}
      POSTGRES_DB: ${POSTGRES_DB:-xchangeai}
      # initdb 脚本用:各 schema 的 role 名(=schema 名)与密码,各走独立变量
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-pwd}
      IDM_DB_USER: ${IDM_DB_USER:-idm}
      IDM_DB_PASSWORD: ${IDM_DB_PASSWORD:-pwd}
    ports:
      - "${PG_PORT:-5821}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 首次初始化时建 app/idm 的 role + schema(role 的 search_path 指向自己 schema)
      - ./scripts/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xchangeai} -d ${POSTGRES_DB:-xchangeai}"]
      interval: 5s
      timeout: 3s
      retries: 10

  dbhub:
    image: bytebase/dbhub
    depends_on:
      pg:
        condition: service_healthy
    # 连本栈的 pg,以 HTTP 暴露 MCP(给 AI 工具查询/管理这个项目的数据库)。
    command:
      - --transport
      - http
      - --port
      - "8080"
      - --dsn
      - postgres://${POSTGRES_USER:-xchangeai}:${POSTGRES_PASSWORD:-xchangeai}@pg:5432/${POSTGRES_DB:-xchangeai}?sslmode=disable
    # 安全建议:dbhub 支持只读模式,确认 flag 后在上面 command 加一行(如 `--readonly`)防 MCP 误写。
    ports:
      - "${DBHUB_PORT:-3777}:8080"

volumes:
  pgdata:
